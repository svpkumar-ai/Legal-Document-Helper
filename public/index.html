<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AI Legal Document Helper</title>
    <meta
      name="description"
      content="Explain contracts in plain language, summarise key clauses, score risk, compare versions, and draft documents — with a document-aware AI assistant."
    />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚖️</text></svg>" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="brand">
        <span class="brand-mark">⚖️</span>
        <div>
          <h1>Legal Document Helper</h1>
          <p class="tagline">Understand, analyse & draft legal documents with AI</p>
        </div>
      </div>
    </header>

    <main class="layout">
      <nav class="tabs" role="tablist" aria-label="Tools">
        <button class="tab is-active" data-mode="explain" role="tab"><span class="tab-emoji">💬</span> Explain</button>
        <button class="tab" data-mode="summarize" role="tab"><span class="tab-emoji">📌</span> Summarise</button>
        <button class="tab" data-mode="risks" role="tab"><span class="tab-emoji">⚠️</span> Spot Risks</button>
        <button class="tab" data-mode="scoreboard" role="tab"><span class="tab-emoji">📊</span> Risk Score</button>
        <button class="tab" data-mode="compare" role="tab"><span class="tab-emoji">🔀</span> Compare</button>
        <button class="tab" data-mode="draft" role="tab"><span class="tab-emoji">✍️</span> Draft</button>
      </nav>

      <section class="workspace">
        <div class="panel input-panel">
          <div class="panel-head">
            <h2 id="input-title">Paste your contract</h2>
          </div>

          <!-- Input slots are built dynamically per tool -->
          <div id="input-slots" class="input-slots"></div>

          <div id="instructions-row" class="instructions-row">
            <input
              id="instructions"
              class="instructions"
              type="text"
              placeholder="Optional: anything specific you want the AI to focus on…"
            />
          </div>

          <button id="run-btn" class="run-btn" type="button">
            <span class="btn-spinner" aria-hidden="true"></span>
            <span class="run-label">Explain this document</span>
          </button>
          <p class="hint" id="input-hint"></p>
        </div>

        <div class="panel output-panel">
          <div class="panel-head">
            <h2 id="output-title">Result</h2>
            <button id="copy-btn" class="ghost-btn" type="button" hidden>Copy</button>
          </div>
          <div id="output" class="output" aria-live="polite">
            <div class="empty-state">
              <div class="empty-emoji">📄</div>
              <p>Your AI analysis will appear here.</p>
              <p class="empty-sub">Fill in the left panel and press the button.</p>
            </div>
          </div>
        </div>
      </section>
    </main>

    <!-- hidden file input reused by every upload button -->
    <input id="file-input" type="file" accept=".pdf,.docx,.txt,.md,application/pdf" hidden />

    <!-- Prominent full-screen loading overlay (shown on every run until a result appears) -->
    <div id="overlay" class="overlay" hidden>
      <div class="overlay-card">
        <div class="overlay-spinner"></div>
        <p id="overlay-title" class="overlay-title">Working…</p>
        <p id="overlay-sub" class="overlay-sub"></p>
      </div>
    </div>

    <script src="/app.js"></script>
  </body>
</html>
